base_model: Qwen/Qwen3-0.6B

# Qwen3-specific chat template for correct assistant loss masking
chat_template: qwen3
strict: false

datasets:
  - path: ./data/processed/train.jsonl
    type: chat_template
    roles_to_train:
      - assistant

test_datasets:
  - path: ./data/processed/val.jsonl
    type: chat_template
    roles_to_train:
      - assistant

val_set_size: 0
output_dir: ./checkpoints
dataset_prepared_path: ./data/axolotl_prepared

# Sequence length & packing
sequence_len: 32768
sample_packing: true
eval_sample_packing: true
pad_to_sequence_len: true

# Full fine-tuning
load_in_8bit: false
load_in_4bit: false

# Precision
bf16: auto
tf32: true

# Batch size (2 per GPU × 2 GPUs × 8 accum = 32 effective)
micro_batch_size: 2
gradient_accumulation_steps: 8

# Training schedule
num_epochs: 3
optimizer: adamw_torch_fused
learning_rate: 2e-5
lr_scheduler: cosine
warmup_steps: 100
weight_decay: 0.01
max_grad_norm: 1.0

# Memory optimization
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
flash_attention: true

# Logging & saving
logging_steps: 10
evals_per_epoch: 4
saves_per_epoch: 2
save_total_limit: 3

# W&B
wandb_project: md-reheader
wandb_name: baseline-full-ft-32k-ddp
wandb_entity:

# DDP across 2x RTX 4090 (model fits easily on one GPU, no FSDP needed)

plugins:
  - axolotl.integrations.cut_cross_entropy.CutCrossEntropyPlugin

seed: 42
