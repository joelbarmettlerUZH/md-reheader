base_model: Qwen/Qwen3-0.6B

# Qwen3-specific chat template for correct assistant loss masking
chat_template: qwen3
strict: false

datasets:
  - path: ./data/processed/train.jsonl
    type: chat_template
    roles_to_train:
      - assistant

val_set_size: 0
output_dir: ./checkpoints
dataset_prepared_path: ./data/axolotl_prepared

# Sequence length & packing
sequence_len: 32768
sample_packing: true
eval_sample_packing: true
pad_to_sequence_len: true

# Full fine-tuning
load_in_8bit: false
load_in_4bit: false

# Precision
bf16: auto
tf32: true

# Batch size
micro_batch_size: 1
gradient_accumulation_steps: 16

# Training schedule
num_epochs: 3
optimizer: adamw_torch_fused
learning_rate: 2e-5
lr_scheduler: cosine
warmup_steps: 200
weight_decay: 0.01

# Memory optimization
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
flash_attention: true

# Logging & saving
logging_steps: 10
evals_per_epoch: 4
saves_per_epoch: 2
save_total_limit: 3

# W&B
wandb_project: md-reheader
wandb_name:
wandb_entity:

# FSDP2 across 2x RTX 4090
fsdp:
  - full_shard
  - auto_wrap
fsdp_config:
  fsdp_version: 2
  offload_params: false
  cpu_ram_efficient_loading: true
  auto_wrap_policy: TRANSFORMER_BASED_WRAP
  transformer_layer_cls_to_wrap: Qwen3DecoderLayer
  state_dict_type: FULL_STATE_DICT
  reshard_after_forward: true
  activation_checkpointing: true

plugins:
  - axolotl.integrations.cut_cross_entropy.CutCrossEntropyPlugin

seed: 42
