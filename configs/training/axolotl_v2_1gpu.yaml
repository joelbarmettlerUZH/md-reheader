base_model: Qwen/Qwen3-0.6B

chat_template: qwen3
strict: false

datasets:
  - path: ./data/processed_v2/train.jsonl
    type: chat_template
    roles_to_train:
      - assistant

test_datasets:
  - path: ./data/processed_v2/val.jsonl
    type: chat_template
    roles_to_train:
      - assistant

val_set_size: 0
output_dir: ./checkpoints_v2
dataset_prepared_path: ./data/axolotl_prepared_v2

# Capped at 8192 — stripped docs fit easily
sequence_len: 8192
sample_packing: true
eval_sample_packing: true
pad_to_sequence_len: true

load_in_8bit: false
load_in_4bit: false

bf16: auto
tf32: true

micro_batch_size: 2
gradient_accumulation_steps: 8

num_epochs: 2
optimizer: adamw_torch_fused
learning_rate: 2e-5
lr_scheduler: cosine
warmup_steps: 100
weight_decay: 0.01
max_grad_norm: 1.0

gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
flash_attention: true

logging_steps: 10
evals_per_epoch: 4
saves_per_epoch: 2
save_total_limit: 3

wandb_project: md-reheader
wandb_name: v2-markers-levels-8k-1gpu
wandb_entity:

plugins:
  - axolotl.integrations.cut_cross_entropy.CutCrossEntropyPlugin

seed: 42
