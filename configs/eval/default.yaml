defaults:
  - _self_

model:
  name: "Qwen/Qwen3-0.6B"
  checkpoint_path: "./checkpoints/final"
  max_seq_len: 32768

data:
  test_path: "./data/processed/test.jsonl"

metrics:
  - exact_match
  - per_heading_accuracy
  - hierarchy_preservation
  - mean_absolute_error

slicing:
  by_doc_length:
    - [0, 2048, "< 2k"]
    - [2048, 4096, "2k-4k"]
    - [4096, 8192, "4k-8k"]
    - [8192, 16384, "8k-16k"]
    - [16384, 32768, "16k-32k"]
  by_heading_count:
    - [3, 5]
    - [6, 15]
    - [16, 40]
    - [40, 999]

output:
  results_dir: "./results"
  plots_dir: "./results/plots"
