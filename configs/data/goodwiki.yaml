defaults:
  - _self_

source:
  name: "euirim/goodwiki"
  split: "train"
  streaming: false  # small enough to load fully

filtering:
  min_headings: 3
  min_distinct_levels: 2
  min_char_length: 300
  max_char_length: 150000
  max_headings: 120
  min_tokens: 100
  max_tokens: 31000

output:
  raw_path: "./data/raw/goodwiki_raw.jsonl"
