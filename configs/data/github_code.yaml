defaults:
  - _self_

source:
  name: "codeparrot/github-code"
  language: "Markdown"
  split: "train"
  streaming: true

sampling:
  # Prefer docs/wiki/guide paths for deeper heading hierarchies
  priority_patterns: ["docs/", "doc/", "wiki/", "guide/", "manual/", "tutorial/"]
  priority_ratio: 0.7  # 70% from priority paths, 30% READMEs
  target_count: 100000

filtering:
  min_headings: 3
  min_distinct_levels: 2
  min_char_length: 300
  max_char_length: 150000
  max_headings: 120
  # Token filter applied in prepare step, not during download
  min_tokens: 100
  max_tokens: 31000

output:
  raw_path: "./data/raw/github_code_raw.jsonl"
